<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>GEOINT Dashboard — Secure Maritime/Aerial Tracking</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"
    />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <!-- Main Application -->
    <div id="app">
      <!-- Top Bar -->
      <header id="top-bar">
        <div class="top-bar-left">
          <span class="app-title">🛡️ GEOINT Dashboard</span>
          <span class="classification-badge">UNCLASSIFIED</span>
        </div>
        <div class="top-bar-center">
          <span id="connection-status" class="status-indicator disconnected">
            <span class="status-dot"></span>
            <span class="status-text">Disconnected</span>
          </span>
          <span id="asset-count" class="stat-badge">Assets: 0</span>
          <span id="alert-count" class="stat-badge alert">Alerts: 0</span>
        </div>
        <div class="top-bar-right">
          <button id="btn-add-asset" class="btn-sm">+ Asset</button>
          <button id="btn-add-position" class="btn-sm">+ Position</button>
        </div>
      </header>

      <!-- Map Container -->
      <div id="map-container">
        <div id="map"></div>

        <!-- Map Controls -->
        <div id="map-controls">
          <button id="btn-zoom-all" class="map-btn" title="Fit all assets">
            📍
          </button>
          <button
            id="btn-toggle-zones"
            class="map-btn active"
            title="Toggle geofence zones"
          >
            🔲
          </button>
          <button id="btn-toggle-tracks" class="map-btn" title="Toggle tracks">
            〰️
          </button>
        </div>

        <!-- Asset Type Filters -->
        <div id="asset-filters">
          <label class="filter-chip active" data-type="all">
            <input type="radio" name="asset-filter" value="all" checked /> All
          </label>
          <label class="filter-chip" data-type="MARITIME">
            <input type="radio" name="asset-filter" value="MARITIME" /> 🚢
            Maritime
          </label>
          <label class="filter-chip" data-type="AERIAL">
            <input type="radio" name="asset-filter" value="AERIAL" /> ✈️ Aerial
          </label>
          <label class="filter-chip" data-type="GROUND">
            <input type="radio" name="asset-filter" value="GROUND" /> 🚛 Ground
          </label>
        </div>
      </div>

      <!-- Alert Panel (Slide-out) -->
      <aside id="alert-panel" class="panel">
        <div class="panel-header">
          <h2>⚠️ Geofence Alerts</h2>
          <button id="btn-close-alerts" class="btn-icon">✕</button>
        </div>
        <div id="alert-list" class="panel-body">
          <p class="empty-state">No active alerts</p>
        </div>
      </aside>

      <!-- Asset Panel (Slide-out) -->
      <aside id="asset-panel" class="panel panel-left">
        <div class="panel-header">
          <h2>📡 Tracked Assets</h2>
          <button id="btn-close-assets" class="btn-icon">✕</button>
        </div>
        <div id="asset-list" class="panel-body">
          <p class="empty-state">No tracked assets</p>
        </div>
      </aside>

      <!-- Asset Detail Popup (shown via OpenLayers overlay) -->
      <div id="asset-popup" class="popup" hidden>
        <div class="popup-header">
          <strong id="popup-callsign"></strong>
          <span id="popup-type" class="badge"></span>
        </div>
        <div class="popup-body">
          <div class="popup-row">
            <span>Lat/Lon:</span> <span id="popup-coords"></span>
          </div>
          <div class="popup-row">
            <span>Heading:</span> <span id="popup-heading"></span>
          </div>
          <div class="popup-row">
            <span>Speed:</span> <span id="popup-speed"></span>
          </div>
          <div class="popup-row">
            <span>Altitude:</span> <span id="popup-altitude"></span>
          </div>
          <div class="popup-row">
            <span>Source:</span> <span id="popup-source"></span>
          </div>
          <div class="popup-row">
            <span>Last Report:</span> <span id="popup-time"></span>
          </div>
        </div>
      </div>

      <!-- Bottom Status Bar -->
      <footer id="status-bar">
        <span id="mouse-coords">—</span>
        <span id="zoom-level">Zoom: —</span>
        <span id="last-update">Last update: —</span>
      </footer>

      <!-- Add Asset Modal -->
      <div id="modal-add-asset" class="modal-overlay" hidden>
        <div class="modal-card">
          <div class="modal-header">
            <h3>Add New Asset</h3>
            <button class="btn-icon modal-close">✕</button>
          </div>
          <form id="form-add-asset">
            <div class="form-group">
              <label for="new-callsign">Callsign</label>
              <input
                type="text"
                id="new-callsign"
                maxlength="32"
                required
                placeholder="e.g. HMCS-VICTORIA"
              />
            </div>
            <div class="form-group">
              <label for="new-asset-type">Type</label>
              <select id="new-asset-type" required>
                <option value="MARITIME">🚢 Maritime</option>
                <option value="AERIAL">✈️ Aerial</option>
                <option value="GROUND">🚛 Ground</option>
                <option value="SUBSURFACE">🔵 Subsurface</option>
              </select>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="new-asset-lon">Longitude</label>
                <input
                  type="number"
                  id="new-asset-lon"
                  step="any"
                  min="-180"
                  max="180"
                  required
                  placeholder="-63.57"
                />
              </div>
              <div class="form-group">
                <label for="new-asset-lat">Latitude</label>
                <input
                  type="number"
                  id="new-asset-lat"
                  step="any"
                  min="-90"
                  max="90"
                  required
                  placeholder="44.64"
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="new-asset-heading">Heading (°)</label>
                <input
                  type="number"
                  id="new-asset-heading"
                  step="any"
                  min="0"
                  max="360"
                  value="0"
                />
              </div>
              <div class="form-group">
                <label for="new-asset-speed">Speed (kts)</label>
                <input
                  type="number"
                  id="new-asset-speed"
                  step="any"
                  min="0"
                  value="0"
                />
              </div>
            </div>
            <p id="add-asset-error" class="error-text" hidden></p>
            <button type="submit" class="btn-primary">Create Asset</button>
          </form>
        </div>
      </div>

      <!-- Add Position / Report Position Modal -->
      <div id="modal-add-position" class="modal-overlay" hidden>
        <div class="modal-card">
          <div class="modal-header">
            <h3>Report Position</h3>
            <button class="btn-icon modal-close">✕</button>
          </div>
          <form id="form-add-position">
            <div class="form-group">
              <label for="pos-callsign">Asset Callsign</label>
              <select id="pos-callsign" required>
                <option value="">— Select asset —</option>
              </select>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="pos-lon">Longitude</label>
                <input
                  type="number"
                  id="pos-lon"
                  step="any"
                  min="-180"
                  max="180"
                  required
                  placeholder="-63.57"
                />
              </div>
              <div class="form-group">
                <label for="pos-lat">Latitude</label>
                <input
                  type="number"
                  id="pos-lat"
                  step="any"
                  min="-90"
                  max="90"
                  required
                  placeholder="44.64"
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="pos-heading">Heading (°)</label>
                <input
                  type="number"
                  id="pos-heading"
                  step="any"
                  min="0"
                  max="360"
                  value="0"
                />
              </div>
              <div class="form-group">
                <label for="pos-speed">Speed (kts)</label>
                <input
                  type="number"
                  id="pos-speed"
                  step="any"
                  min="0"
                  value="10"
                />
              </div>
            </div>
            <div class="form-group">
              <label for="pos-source">Source</label>
              <select id="pos-source">
                <option value="AIS">AIS</option>
                <option value="ADSB">ADS-B</option>
                <option value="GPS">GPS</option>
                <option value="MANUAL" selected>Manual</option>
              </select>
            </div>
            <p id="add-position-error" class="error-text" hidden></p>
            <button type="submit" class="btn-primary">Submit Position</button>
          </form>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
